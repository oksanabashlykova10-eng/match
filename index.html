<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Match and Connect: Pro Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cormorant+SC:wght@700&family=Exo+2:wght@300;700&family=Bebas+Neue&family=Kelly+Slab&family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&family=Comfortaa:wght@400;700&family=Special+Elite&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --n-green: #39FF14; --n-dark: #004d00; --n-red: #ff003c;
            --bg: #050805; --plate-bg: rgba(21, 26, 21, 0.9);
            --h-font: 'Cormorant SC'; --h-color: #39FF14; --h-size: 32px;
            --h-bg: transparent; --h-border: transparent; --h-b-width: 0px; --h-radius: 0px;
            --p-text-color: #aaa; --p-border: #333; --p-font-size: 16px; --p-b-width: 1px;
            --l-color: #39FF14; --l-width: 2px;
            --btn-font: 'Orbitron'; --btn-color: #39FF14; --btn-size: 18px;
            --disk-fill: #0d0d0d; --disk-active: #39FF14; --disk-neon-size: 15px;
            --ball-color: #ffffff; --ball-size: 18px; 
            --ball-neon: 0 0 30px 8px var(--ball-color), 0 0 10px 2px #fff;
            --stage-bg: rgba(5, 8, 5, 1); --stage-img: none;
            --win-bg: rgba(0,0,0,0.85); --win-color: #39FF14; --win-font: 'Cinzel Decorative'; --win-size: 50px;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: 'Exo 2', sans-serif; overflow: hidden; display: flex; }

        /* Режим игры скрывает редактор */
        body.play-mode #sidebar { display: none !important; }

        /* --- РЕДАКТОР --- */
        #sidebar { width: 440px; height: 100vh; background: #000; border-right: 2px solid var(--n-dark); display: flex; flex-direction: column; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.9); }
        #sidebar-header { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #111; background: #030503; }
        #sidebar-header img { width: 50px; height: 50px; filter: drop-shadow(0 0 10px #00e5ff); object-fit: contain; }
        #sidebar-title { font-family: 'Orbitron'; font-size: 16px; color: #00e5ff; line-height: 1.3; text-shadow: 0 0 10px #00e5ff; font-weight: bold; }
        #sidebar-subtitle { font-family: 'Exo 2'; font-size: 12px; color: #aaa; text-shadow: none; letter-spacing: 1px; }

        .tabs { display: flex; background: #111; border-bottom: 1px solid #222; flex-wrap: wrap; }
        .tab-btn { flex: 1 1 30%; padding: 12px 2px; background: none; border: none; color: #777; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; transition: 0.3s; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-btn.active { color: var(--n-green); background: #0a110a; border-bottom: 3px solid var(--n-green); }
        .tab-content { flex-grow: 1; padding: 20px; overflow-y: auto; display: none; scrollbar-width: none; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-content.active { display: block; }

        .group { margin-bottom: 15px; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #1a1a1a; }
        .group label { display: block; font-size: 13px; color: var(--n-green); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        textarea { font-family: monospace; }
        .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .color-pick { width: 60px; height: 40px; border: 1px solid #333; cursor: pointer; background: none; padding: 0; }
        .neon-toggle { cursor: pointer; font-size: 13px; color: #ccc; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        #sidebar-footer { padding: 12px; text-align: center; font-size: 11px; color: #555; border-top: 1px solid #111; background: #000; font-family: 'Montserrat', sans-serif; font-weight: bold; }

        /* --- ИГРОВОЕ ОКНО --- */
        #stage { flex-grow: 1; display: flex; flex-direction: column; position: relative; height: 100vh; overflow: hidden; }
        #stage-bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-color: var(--stage-bg); background-image: var(--stage-img); background-size: cover; background-position: center; }

        #header { text-align: center; padding: 20px; position: relative; z-index: 100; margin-top: 10px; }
        #h-rect { position: absolute; top: 0; left: 50%; transform: translateX(-50%); height: 100%; width: auto; min-width: 400px; z-index: -2; background: var(--h-bg); border: var(--h-b-width) solid var(--h-border); border-radius: var(--h-radius); padding: 0 40px; }
        #h-plate { position: absolute; top: -20%; left: 50%; transform: translateX(-50%); height: 140%; z-index: -1; pointer-events: none; opacity: 0; object-fit: contain; }
        #title-txt { font-family: var(--h-font), serif; font-size: var(--h-size); color: var(--h-color); margin: 0; letter-spacing: 4px; transition: 0.3s; position: relative; padding: 10px; }

        #arena { display: flex; flex-grow: 1; align-items: center; justify-content: space-around; padding: 0 40px; position: relative; z-index: 100; }
        #disk-box { width: 420px; height: 420px; position: relative; }
        #disk-svg { width: 100%; height: 100%; transform: rotate(-90deg); transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); overflow: visible; }
        .disk-seg { fill: var(--disk-fill); stroke: #222; stroke-width: 0.5; transition: 0.6s; }
        .disk-seg.active { fill: var(--disk-active); stroke: #fff; filter: drop-shadow(0 0 var(--disk-neon-size) var(--disk-active)); }

        .col { display: flex; flex-direction: column; gap: 10px; z-index: 200; width: 240px; }
        .plate { background: var(--plate-bg); padding: 12px; border: var(--p-b-width) solid var(--p-border); border-radius: 4px; cursor: pointer; transition: 0.3s; text-align: center; font-size: var(--p-font-size); color: var(--p-text-color); }
        .plate.sel { background: rgba(0, 50, 0, 0.8); color: #fff; }
        .plate.err { animation: shake 0.4s; border-color: var(--n-red) !important; box-shadow: 0 0 25px var(--n-red) !important; background: rgba(50, 0, 0, 0.9) !important; color: #fff !important; }
        .plate.matched { opacity: 0; pointer-events: none; transform: scale(0.5); transition: 1s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        #footer { height: 120px; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #btn-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
        #btn-plate { position: absolute; max-width: 150%; height: 180%; z-index: -1; pointer-events: none; opacity: 0; }
        #btn { padding: 18px 60px; background: transparent; border: 1px solid var(--n-dark); color: var(--btn-color); font-family: var(--btn-font); font-size: var(--btn-size); cursor: pointer; letter-spacing: 5px; transition: 0.4s; }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .ball { position: absolute; border-radius: 50%; z-index: 300; transition: 1.1s cubic-bezier(0.6, -0.28, 0.735, 0.045); pointer-events: none; box-shadow: var(--ball-neon); background: var(--ball-color); width: var(--ball-size); height: var(--ball-size); }

        #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--win-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 1.5s; backdrop-filter: blur(5px); }
        #win-screen.show { opacity: 1; pointer-events: auto; }
        #win-text { font-family: var(--win-font), sans-serif; font-size: var(--win-size); color: var(--win-color); text-shadow: 0 0 30px var(--win-color); text-align: center; margin: 0; padding: 0 20px; line-height: 1.2; }
        #btn-replay { margin-top: 40px; padding: 15px 50px; background: rgba(0,0,0,0.7); border: 2px solid var(--win-color); color: var(--win-color); font-family: 'Orbitron'; font-size: 20px; cursor: pointer; transition: 0.3s; border-radius: 8px; letter-spacing: 3px; }
        #btn-replay:hover { background: var(--win-color); color: #000; box-shadow: 0 0 30px var(--win-color); }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <img src="https://img.genially.com/67961b32a116fb001568a75e/673752a5-8d4d-40d1-9b5f-f04ebd91a27c.png" alt="Logo">
        <div id="sidebar-title">Match and Connect<br><span id="sidebar-subtitle">Game Editor by English Bootcamp</span></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tab-data')">ДАННЫЕ И ФИНАЛ</button>
        <button class="tab-btn" onclick="openTab('tab-design')">ДИЗАЙН И ПЛАШКИ</button>
        <button class="tab-btn" onclick="openTab('tab-core')">ДИСК И ШАРИК</button>
        <button class="tab-btn" onclick="openTab('tab-bg')">ЗВУК И ФОН</button>
        <button class="tab-btn" style="color:var(--n-green);" onclick="openTab('tab-export')">ЭКСПОРТ!</button>
    </div>

    <div id="tab-data" class="tab-content active config-group">
        <div class="group"><label>Заголовок:</label><input type="text" id="h-text" value="Identification Protocol" oninput="liveUpdate()"></div>
        <div class="group"><label>Текст кнопки:</label><input type="text" id="btn-text" value="SYNC GLYPHS" oninput="liveUpdate()"></div>
        <div class="group"><label>Пары (Слово | Ответ):</label>
            <textarea id="simple-input" style="height: 120px;">Xibalba | Digital Server
Hero Twins | Clever Hackers
Lords of Death | Security Progs
Golden Ball | Data Packet
Dark House | No Power Room
K'aak | Magic Firefly
Kukulkan | Main Firewall
Sarcophagus | Upload Station</textarea>
        </div>
        <div class="group">
            <label>ФИНАЛЬНАЯ ЗАСТАВКА (Победа):</label>

            <select id="win-font-sel" onchange="liveUpdate()">
                <option value="'Orbitron'">Orbitron (Техно)</option>
                <option value="'Cinzel Decorative'">Epic (Cinzel)</option>
                <option value="'Bebas Neue'">Power Bold</option>
                <option value="'Cormorant SC'">Ancient Maya</option>

            <label>Затемнение фона (0-100%):</label><input type="number" id="win-bg-alpha" value="85" oninput="liveUpdate()">
        </div>
        <button style="width:100%; padding:15px; background:var(--n-green); border:none; color:black; font-family:'Orbitron'; font-weight:bold; cursor:pointer;" onclick="renderGame()">ОБНОВИТЬ ИГРУ</button>
    </div>

    <div id="tab-design" class="tab-content config-group">

            <select id="h-font-sel" onchange="liveUpdate()">
                <option value="'Cormorant SC'">Cormorant (Майя)</option>
                <option value="'Papyrus', fantasy">Mayan Stone (Papyrus)</option>
                <option value="'Special Elite'">Typewriter</option>
                <option value="'Cinzel Decorative'">Epic (Cinzel)</option>
                <option value="'Orbitron'">Orbitron (Техно)</option>

            </select>
            <div class="row"><input type="color" id="h-color-val" class="color-pick" value="#39FF14" onchange="liveUpdate()"><input type="number" id="h-size-val" value="32" oninput="liveUpdate()"><label class="neon-toggle"><input type="checkbox" id="h-neon-chk" checked onchange="liveUpdate()"> НЕОН</label></div>
            <label>Подложка-плашка заголовка (Фон/Рамка):</label>
            <div class="row"><input type="color" id="h-bg-val" class="color-pick" value="#000000" onchange="liveUpdate()"><input type="number" id="h-bg-alpha" value="0" title="Прозрачность" oninput="liveUpdate()"></div>
            <div class="row"><input type="color" id="h-border-val" class="color-pick" value="#39FF14" onchange="liveUpdate()"><input type="number" id="h-bw-val" value="0" title="Обводка px" oninput="liveUpdate()"><input type="number" id="h-rad-val" value="10" title="Скругление px" oninput="liveUpdate()"></div>
            <label>Картинка-подложка заголовка (URL):</label><input type="text" id="h-img-url" placeholder="URL картинки" oninput="liveUpdate()">
        </div>
        <div class="group">
            <label>Игровые Плашки (Фон и Текст):</label>
            <div class="row"><input type="color" id="p-bg-val" class="color-pick" value="#1a1f1a" onchange="liveUpdate()"><input type="number" id="p-alpha-val" value="90" oninput="liveUpdate()"><input type="color" id="p-text-val" class="color-pick" value="#cccccc" onchange="liveUpdate()"><input type="number" id="p-size-val" value="16" oninput="liveUpdate()"></div>
            <label>Обводка плашек:</label>
            <div class="row"><input type="color" id="p-border-val" class="color-pick" value="#333333" onchange="liveUpdate()"><input type="number" id="p-border-w-val" value="1" title="Толщина px" oninput="liveUpdate()"><label class="neon-toggle"><input type="checkbox" id="p-neon-chk" checked onchange="liveUpdate()"> НЕОН</label></div>
        </div>
        <div class="group">
            <label>Соединительные Нити:</label>
            <div class="row"><input type="color" id="l-color-val" class="color-pick" value="#39FF14" onchange="liveUpdate()"><input type="number" id="l-width-val" value="2" oninput="liveUpdate()"><label class="neon-toggle"><input type="checkbox" id="l-neon-chk" checked onchange="liveUpdate()"> НЕОН</label></div>

    <div id="tab-core" class="tab-content config-group">

        </div>
        <div class="group">
            <label>ВЫЛЕТАЮЩИЙ ШАРИК:</label>
            <div class="row"><input type="color" id="ball-color-val" class="color-pick" value="#ffffff" onchange="liveUpdate()"><input type="number" id="ball-size-val" value="18" title="Размер px" oninput="liveUpdate()"><label class="neon-toggle"><input type="checkbox" id="ball-neon-chk" checked onchange="liveUpdate()"> НЕОН</label></div>
        </div>
        <div class="group">
            <label>Кнопка подтверждения:</label>
            <select id="btn-font-sel" onchange="liveUpdate()">
                <option value="'Orbitron'">Orbitron (Техно)</option>
                <option value="'Bebas Neue'">Bebas Neue (Жирный)</option>
                <option value="'Cinzel Decorative'">Epic (Cinzel)</option>
            </select>
            <div class="row"><input type="color" id="btn-color-val" class="color-pick" value="#39FF14" onchange="liveUpdate()"><input type="number" id="btn-size-val" value="18" oninput="liveUpdate()"><label class="neon-toggle"><input type="checkbox" id="btn-neon-chk" checked onchange="liveUpdate()"> НЕОН</label></div>
            <label>Картинка кнопки (URL):</label><input type="text" id="btn-img-url" placeholder="URL подложки" oninput="liveUpdate()">
        </div>
    </div>

    <div id="tab-bg" class="tab-content config-group">
        <div class="group">
            <label>Фон Игры (Цвет и Прозрачность слоя):</label>
            <div class="row"><input type="color" id="bg-color-val" class="color-pick" value="#050805" onchange="liveUpdate()"><input type="number" id="bg-alpha-val" value="100" oninput="liveUpdate()"></div>
            <label>Картинка Фона игры (URL):</label><input type="text" id="bg-img-url" placeholder="URL фона игры" oninput="liveUpdate()">
        </div>
        <div class="group">

    <div id="tab-export" class="tab-content">
        <h2>Генератор Кода</h2>
        <div class="group">
            <label>Абсолютная ссылка на этот файл на хостинге (GitHub/и т.д.):</label>
            <input type="text" id="github-url" value="https://ваш-сайт.com/игра.html" style="font-size: 11px; color: #0f0;">
            <p style="font-size:10px; color:#aaa; margin-top:5px; line-height:1.2;">*Для обхода защиты Genially нужен адрес, где физически лежит этот файл. Редактор добавит к нему настройки и замаскирует.</p>
        </div>
        <button style="width:100%; padding:15px; background:var(--n-green); border:none; color:black; font-family:'Orbitron'; font-size: 14px; font-weight:bold; cursor:pointer; margin-bottom: 10px;" onclick="generateExport()">СГЕНЕРИРОВАТЬ ДЛЯ GENIALLY</button>

    </div>

    <div id="sidebar-footer">&copy; 2026 Все права принадлежат Башлыковой Оксане Михайловне</div>
</div>

<div id="stage">
    <div id="stage-bg-layer"></div>
    <div id="header"><div id="h-rect"></div><img id="h-plate" src=""><h1 id="title-txt">Identification Protocol</h1></div>
    <div id="arena">
        <div id="disk-box"><svg id="disk-svg" viewBox="0 0 100 100"><defs><pattern id="d-pat" patternUnits="userSpaceOnUse" width="100" height="100"><image id="d-img-asset" x="0" y="0" width="100" height="100" /></pattern></defs><g id="disk-g"></g></svg></div>
        <div class="col" id="col-L"></div>
        <div class="col" id="col-R"></div>
    </div>
    <div id="footer"><div id="btn-wrap"><img id="btn-plate" src=""><button id="btn" onclick="check()" disabled>SYNC GLYPHS</button></div></div>
    <canvas id="c"></canvas>
    <div id="win-screen">
        <h1 id="win-text">YOU OPENED THE GATE!</h1>
        <button id="btn-replay" onclick="resetGame()">PLAY AGAIN</button>
    </div>
</div>

<script>
    let pairs = [], selL = null, selR = null, matched = 0, audioCtx = null;
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d'), stage = document.getElementById('stage');

    // Архитектура 2-в-1: Проверка хэша при загрузке
    window.onload = () => {
        const hash = window.location.hash;
        if (hash.startsWith('#play=')) {
            document.body.classList.add('play-mode');
            loadGameFromHash(hash.replace('#play=', ''));
        } else {
            renderGame();
            draw();
        }
    };

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- ЛОГИКА ЭКСПОРТА (ПАМЯТКА GENIALLY) ---
    function saveConfig() {
        const config = {};
        document.querySelectorAll('.config-group input, .config-group select, .config-group textarea').forEach(el => {
            if(el.id) config[el.id] = el.type === 'checkbox' ? el.checked : el.value;
        });
        return config;
    }

    function loadGameFromHash(payload) {
        try {
            // URL-safe декодирование
            let base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            // Безопасный парсинг кириллицы (UTF-8)
            const decodedStr = decodeURIComponent(Array.prototype.map.call(atob(base64), function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const config = JSON.parse(decodedStr);
            for(const key in config) {
                const el = document.getElementById(key);
                if(el) {
                    if(el.type === 'checkbox') el.checked = config[key];
                    else el.value = config[key];
                }
            }
            liveUpdate();
            renderGame();
            draw();
        } catch(e) { console.error("Ошибка загрузки конфига", e); }
    }

    function generateExport() {
        const config = saveConfig();
        const jsonStr = JSON.stringify(config);
        
        // Кодируем в UTF-8 Base64 (безопасно для кириллицы)
        const encoded = btoa(encodeURIComponent(jsonStr).replace(/%([0-9A-F]{2})/g, function(match, p1) { 
            return String.fromCharCode('0x' + p1); 
        }));
        // Делаем Base64 URL-safe (без плюсов и слэшей)
        const urlSafeBase64 = encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        
        const baseUrl = document.getElementById('github-url').value;
        const fullUrl = baseUrl + '#play=' + urlSafeBase64;
        
        // Маскировка HTML-сущностями для обхода защиты Genially
        const maskedUrl = fullUrl.split('').map(c => '&#' + c.charCodeAt(0) + ';').join('');
        
        const iframeCode = `<iframe src="${maskedUrl}" style="width: 100%; height: 100%; border: none; background: transparent;" allow="autoplay"></iframe>`;
        
        const out = document.getElementById('export-output');
        out.value = iframeCode;
        out.select(); document.execCommand('copy');
        alert("Код скопирован! Вставляйте в Genially через Insert -> Others -> Code");
    }

    // --- ИГРОВОЙ ДВИЖОК ---
    function liveUpdate() {
        const root = document.documentElement;
        
        const hColor = document.getElementById('h-color-val').value;
        root.style.setProperty('--h-font', document.getElementById('h-font-sel').value);
        root.style.setProperty('--h-color', hColor);
        root.style.setProperty('--h-size', document.getElementById('h-size-val').value + 'px');
        document.getElementById('title-txt').style.textShadow = document.getElementById('h-neon-chk').checked ? `0 0 15px ${hColor}` : 'none';

        const hBgHex = document.getElementById('h-bg-val').value;
        const hBgAlpha = document.getElementById('h-bg-alpha').value / 100;
        const hBgR = parseInt(hBgHex.slice(1,3), 16), hBgG = parseInt(hBgHex.slice(3,5), 16), hBgB = parseInt(hBgHex.slice(5,7), 16);
        root.style.setProperty('--h-bg', `rgba(${hBgR},${hBgG},${hBgB},${hBgAlpha})`);
        root.style.setProperty('--h-border', document.getElementById('h-border-val').value);
        root.style.setProperty('--h-b-width', document.getElementById('h-bw-val').value + 'px');
        root.style.setProperty('--h-radius', document.getElementById('h-rad-val').value + 'px');

        const pAlpha = document.getElementById('p-alpha-val').value / 100;
        const pBg = document.getElementById('p-bg-val').value;
        const r = parseInt(pBg.slice(1,3), 16), g = parseInt(pBg.slice(3,5), 16), b = parseInt(pBg.slice(5,7), 16);
        root.style.setProperty('--plate-bg', `rgba(${r},${g},${b},${pAlpha})`);
        root.style.setProperty('--p-text-color', document.getElementById('p-text-val').value);
        root.style.setProperty('--p-font-size', document.getElementById('p-size-val').value + 'px');
        root.style.setProperty('--p-border', document.getElementById('p-border-val').value);
        root.style.setProperty('--p-b-width', document.getElementById('p-border-w-val').value + 'px');
        
        root.style.setProperty('--l-color', document.getElementById('l-color-val').value);
        root.style.setProperty('--l-width', document.getElementById('l-width-val').value + 'px');

        const ballColor = document.getElementById('ball-color-val').value;
        root.style.setProperty('--ball-color', ballColor);
        root.style.setProperty('--ball-size', document.getElementById('ball-size-val').value + 'px');
        root.style.setProperty('--ball-neon', document.getElementById('ball-neon-chk').checked ? `0 0 30px 8px ${ballColor}, 0 0 10px 2px #fff` : 'none');

        root.style.setProperty('--disk-fill', document.getElementById('d-fill-val').value);
        root.style.setProperty('--disk-active', document.getElementById('d-active-val').value);
        root.style.setProperty('--disk-neon-size', document.getElementById('d-neon-size-val').value + 'px');
        const dUrl = document.getElementById('d-img-url').value;
        if(dUrl) document.getElementById('d-img-asset').setAttribute('href', dUrl);
        
        const pColor = document.getElementById('btn-color-val').value;
        root.style.setProperty('--btn-font', document.getElementById('btn-font-sel').value);
        root.style.setProperty('--btn-color', pColor);
        root.style.setProperty('--btn-size', document.getElementById('btn-size-val').value + 'px');
        document.getElementById('btn').style.boxShadow = document.getElementById('btn-neon-chk').checked ? `0 0 20px ${pColor}` : 'none';

        const bgHex = document.getElementById('bg-color-val').value;
        const bgAlpha = document.getElementById('bg-alpha-val').value / 100;
        const bgR = parseInt(bgHex.slice(1,3), 16), bgG = parseInt(bgHex.slice(3,5), 16), bgB = parseInt(bgHex.slice(5,7), 16);
        root.style.setProperty('--stage-bg', `rgba(${bgR},${bgG},${bgB},${bgAlpha})`);
        const bgImg = document.getElementById('bg-img-url').value;
        root.style.setProperty('--stage-img', bgImg ? `url('${bgImg}')` : 'none');

        root.style.setProperty('--win-color', document.getElementById('win-color-val').value);
        root.style.setProperty('--win-font', document.getElementById('win-font-sel').value);
        root.style.setProperty('--win-size', document.getElementById('win-size-val').value + 'px');
        root.style.setProperty('--win-bg', `rgba(0,0,0,${document.getElementById('win-bg-alpha').value / 100})`);
        document.getElementById('win-text').innerText = document.getElementById('win-text-input').value;

        document.getElementById('title-txt').innerText = document.getElementById('h-text').value;
        document.getElementById('btn').innerText = document.getElementById('btn-text').value;
        
        const bImgBtn = document.getElementById('btn-img-url').value;
        document.getElementById('btn-plate').src = bImgBtn;
        document.getElementById('btn-plate').style.opacity = bImgBtn ? 1 : 0;
        
        const hImgVal = document.getElementById('h-img-url').value;
        document.getElementById('h-plate').src = hImgVal;
        document.getElementById('h-plate').style.opacity = hImgVal ? 1 : 0;
    }

    function renderGame() {
        liveUpdate();
        const text = document.getElementById('simple-input').value;
        pairs = text.split('\n').filter(line => line.includes('|')).map(line => {
            const [l, r] = line.split('|').map(s => s.trim());
            return { l, r };
        });

        matched = 0; selL = null; selR = null;
        document.getElementById('col-L').innerHTML = '';
        document.getElementById('col-R').innerHTML = '';
        document.getElementById('btn').disabled = true;
        document.getElementById('disk-svg').style.transform = 'rotate(-90deg)';
        document.getElementById('win-screen').classList.remove('show');
        
        const g = document.getElementById('disk-g'); g.innerHTML = '';
        const step = 360 / pairs.length;
        pairs.forEach((_, i) => {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const a1 = i * step, a2 = (i + 1) * step, rad = 46;
            const x1 = 50 + rad * Math.cos(a1 * Math.PI / 180), y1 = 50 + rad * Math.sin(a1 * Math.PI / 180);
            const x2 = 50 + rad * Math.cos(a2 * Math.PI / 180), y2 = 50 + rad * Math.sin(a2 * Math.PI / 180);
            p.setAttribute("d", `M 50 50 L ${x1} ${y1} A ${rad} ${rad} 0 0 1 ${x2} ${y2} Z`);
            p.classList.add('disk-seg');
            if(document.getElementById('d-img-url').value) p.setAttribute('fill', 'url(#d-pat)');
            g.appendChild(p);
        });

        const L_shuff = [...pairs].sort(() => Math.random() - 0.5);
        const R_shuff = [...pairs].sort(() => Math.random() - 0.5);
        L_shuff.forEach(item => spawnP(item.l, 'col-L', item.l));
        R_shuff.forEach(item => spawnP(item.r, 'col-R', item.l));
        
        resizeCanvas();
    }

    function spawnP(txt, side, id) {
        const p = document.createElement('div');
        p.className = 'plate'; p.innerText = txt; p.dataset.id = id;
        p.onclick = () => {
            initAudio(); playMedia('tap');
            if(side === 'col-L') { if(selL) selL.classList.remove('sel'); selL = p; }
            else { if(selR) selR.classList.remove('sel'); selR = p; }
            p.classList.add('sel');
            if(document.getElementById('p-neon-chk').checked) { p.style.boxShadow = `0 0 20px 2px ${document.getElementById('h-color-val').value}`; } else { p.style.boxShadow = 'none'; }
            document.getElementById('btn').disabled = !(selL && selR);
        };
        document.getElementById(side).appendChild(p);
    }

    function check() {
        const L = selL, R = selR;
        if(L.dataset.id === R.dataset.id) {
            playMedia('win');
            L.style.borderColor = 'var(--n-green)';
            const rRect = R.getBoundingClientRect(), sRect = stage.getBoundingClientRect();
            const ball = document.createElement('div'); ball.className = 'ball';
            ball.style.left = (rRect.left - sRect.left + rRect.width/2) + 'px';
            ball.style.top = (rRect.top - sRect.top + rRect.height/2) + 'px';
            stage.appendChild(ball);
            
            setTimeout(() => {
                const dBox = document.getElementById('disk-box').getBoundingClientRect();
                ball.style.left = (dBox.left - sRect.left + dBox.width/2 - 9) + 'px';
                ball.style.top = (dBox.top - sRect.top + dBox.height/2 - 9) + 'px';
                ball.style.transform = 'scale(0)';
            }, 50);

            setTimeout(() => {
                L.classList.add('matched'); R.classList.add('matched');
                const seg = document.querySelectorAll('.disk-seg')[matched];
                seg.classList.add('active');
                matched++; ball.remove();
                
                if(matched === pairs.length) {
                    playMedia('final');
                    document.getElementById('disk-svg').style.transform = 'rotate(720deg)';
                    setTimeout(() => { document.getElementById('win-screen').classList.add('show'); }, 1500);
                }
            }, 1000);
        } else {
            playMedia('fail');
            L.style.boxShadow = ''; R.style.boxShadow = '';
            L.classList.add('err'); R.classList.add('err');
            setTimeout(() => { L.classList.remove('sel', 'err'); R.classList.remove('sel', 'err'); }, 1000);
        }
        selL = null; selR = null; document.getElementById('btn').disabled = true;
    }

    function resetGame() { playMedia('tap'); renderGame(); }

    function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); } else if (audioCtx.state === 'suspended') { audioCtx.resume(); } }

    function playMedia(type) {
        const url = document.getElementById('snd-' + type) ? document.getElementById('snd-' + type).value : '';
        if (url) { let a = new Audio(url); a.play().catch(e => synthSfx(type)); } else { synthSfx(type); }
    }

    function synthSfx(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if(type === 'tap') { osc.frequency.setValueAtTime(800, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); osc.start(); osc.stop(now + 0.1); }
        else if(type === 'win') { osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.6); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6); osc.start(); osc.stop(now + 0.6); }
        else if(type === 'fail') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4); osc.start(); osc.stop(now + 0.4); }
        else if(type === 'final') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(2000, now + 2); 
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5); 
            osc.start(); osc.stop(now + 2.5); 
        }
    }

    function resizeCanvas() { canvas.width = stage.clientWidth; canvas.height = stage.clientHeight; }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        if(selL && selR) {
            const sRect = stage.getBoundingClientRect(), r1 = selL.getBoundingClientRect(), r2 = selR.getBoundingClientRect();
            ctx.beginPath(); ctx.setLineDash([5, 8]);
            ctx.moveTo(r1.right - sRect.left, r1.top - sRect.top + r1.height/2);
            ctx.lineTo(r2.left - sRect.left, r2.top - sRect.top + r2.height/2);
            const lineCol = document.getElementById('l-color-val').value;
            ctx.strokeStyle = selL.classList.contains('err') ? 'var(--n-red)' : lineCol;
            
            if(document.getElementById('l-neon-chk').checked && !selL.classList.contains('err')) { 
                ctx.shadowBlur = 25; ctx.shadowColor = lineCol; 
                ctx.lineWidth = document.getElementById('l-width-val').value;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.lineWidth = document.getElementById('l-width-val').value / 1.5;
                ctx.strokeStyle = '#fff';
            } else { 
                ctx.shadowBlur = 0; 
                ctx.lineWidth = document.getElementById('l-width-val').value;
            }
            ctx.stroke();
        }
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
