<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Match and Connect: Pro Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cormorant+SC:wght@700&family=Exo+2:wght@300;700&family=Bebas+Neue&family=Kelly+Slab&family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&family=Comfortaa:wght@400;700&family=Special+Elite&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --n-green: #39FF14; --n-dark: #004d00; --n-red: #ff003c;
            --bg: #050805; --plate-bg: rgba(21, 26, 21, 0.9);
            --h-font: 'Cormorant SC'; --h-color: #39FF14; --h-size: 32px;
            --h-bg: transparent; --h-border: transparent; --h-b-width: 0px; --h-radius: 0px;
            --p-text-color: #aaa; --p-border: #333; --p-font-size: 16px; --p-b-width: 1px;
            --l-color: #39FF14; --l-width: 2px;
            --btn-font: 'Orbitron'; --btn-color: #39FF14; --btn-size: 18px;
            --disk-fill: rgba(13, 13, 13, 0.9); --disk-active: #39FF14; --disk-neon-size: 15px;
            --ball-color: #ffffff; --ball-size: 18px; 
            --ball-neon: 0 0 30px 8px var(--ball-color), 0 0 10px 2px #fff;
            --stage-bg: rgba(5, 8, 5, 1); --stage-img: none;
            --win-bg: rgba(0,0,0,0.85); --win-color: #39FF14; --win-font: 'Cinzel Decorative'; --win-size: 50px;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: 'Exo 2', sans-serif; overflow: hidden; display: flex; }
        body.play-mode #sidebar { display: none !important; }

        /* --- РЕДАКТОР --- */
        #sidebar { width: 440px; height: 100vh; background: #000; border-right: 2px solid var(--n-dark); display: flex; flex-direction: column; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.9); }
        #sidebar-header { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #111; background: #030503; }
        #sidebar-header img { width: 50px; height: 50px; filter: drop-shadow(0 0 10px #00e5ff); object-fit: contain; }
        #sidebar-title { font-family: 'Orbitron'; font-size: 16px; color: #00e5ff; line-height: 1.3; text-shadow: 0 0 10px #00e5ff; font-weight: bold; }
        
        .tabs { display: flex; background: #111; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 12px 5px; background: none; border: none; color: #777; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; transition: 0.3s; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-btn.active { color: var(--n-green); background: #0a110a; border-bottom: 3px solid var(--n-green); }
        .tab-content { flex-grow: 1; padding: 20px; overflow-y: auto; display: none; scrollbar-width: none; }
        .tab-content.active { display: block; }

        .group { margin-bottom: 15px; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #1a1a1a; }
        .group label { display: block; font-size: 12px; color: var(--n-green); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .color-pick { width: 60px; height: 40px; cursor: pointer; background: none; padding: 0; border: 1px solid #333; }

        /* --- ИГРОВОЕ ОКНО --- */
        #stage { flex-grow: 1; display: flex; flex-direction: column; position: relative; height: 100vh; overflow: hidden; }
        #stage-bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-color: var(--stage-bg); background-image: var(--stage-img); background-size: cover; background-position: center; }

        #header { text-align: center; padding: 20px; position: relative; z-index: 100; margin-top: 10px; }
        #h-rect { position: absolute; top: 0; left: 50%; transform: translateX(-50%); height: 100%; width: auto; min-width: 400px; z-index: -2; background: var(--h-bg); border: var(--h-b-width) solid var(--h-border); border-radius: var(--h-radius); padding: 0 40px; }
        #title-txt { font-family: var(--h-font), serif; font-size: var(--h-size); color: var(--h-color); margin: 0; letter-spacing: 4px; transition: 0.3s; position: relative; }

        #arena { display: flex; flex-grow: 1; align-items: center; justify-content: space-around; padding: 0 40px; position: relative; z-index: 100; }
        #disk-box { width: 420px; height: 420px; position: relative; }
        #disk-svg { width: 100%; height: 100%; transform: rotate(-90deg); transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); overflow: visible; }
        .disk-seg { fill: var(--disk-fill); stroke: rgba(255,255,255,0.1); stroke-width: 0.5; transition: 0.6s; }
        .disk-seg.active { fill: var(--disk-active) !important; stroke: #fff; filter: drop-shadow(0 0 var(--disk-neon-size) var(--disk-active)); fill-opacity: 1 !important; }
        #d-img-asset { pointer-events: none; }

        .col { display: flex; flex-direction: column; gap: 10px; z-index: 200; width: 240px; }
        .plate { background: var(--plate-bg); padding: 12px; border: var(--p-b-width) solid var(--p-border); border-radius: 4px; cursor: pointer; transition: 0.3s; text-align: center; font-size: var(--p-font-size); color: var(--p-text-color); }
        .plate.sel { background: rgba(0, 50, 0, 0.8); color: #fff; }
        .plate.matched { opacity: 0; pointer-events: none; transform: scale(0.5); transition: 1s; }

        #footer { height: 120px; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #btn { padding: 18px 60px; background: transparent; border: 1px solid var(--n-dark); color: var(--btn-color); font-family: var(--btn-font); font-size: var(--btn-size); cursor: pointer; letter-spacing: 5px; transition: 0.4s; }
        #btn:disabled { opacity: 0.3; cursor: default; }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .ball { position: absolute; border-radius: 50%; z-index: 300; transition: 1.1s cubic-bezier(0.6, -0.28, 0.735, 0.045); pointer-events: none; box-shadow: var(--ball-neon); background: var(--ball-color); width: var(--ball-size); height: var(--ball-size); }

        #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--win-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 1s; backdrop-filter: blur(5px); }
        #win-screen.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <img src="https://img.genially.com/67961b32a116fb001568a75e/673752a5-8d4d-40d1-9b5f-f04ebd91a27c.png">
        <div id="sidebar-title">Match and Connect PRO</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tab-data')">Данные</button>
        <button class="tab-btn" onclick="openTab('tab-core')">Диск</button>
        <button class="tab-btn" onclick="openTab('tab-export')">Экспорт</button>
    </div>

    <div id="tab-data" class="tab-content active config-group">
        <div class="group"><label>Заголовок:</label><input type="text" id="h-text" value="Identification Protocol" oninput="liveUpdate()"></div>
        <div class="group"><label>Текст кнопки:</label><input type="text" id="btn-text" value="SYNC GLYPHS" oninput="liveUpdate()"></div>
        <div class="group"><label>Пары (Слово | Ответ):</label>
            <textarea id="simple-input" style="height: 100px;" oninput="liveUpdate()">Xibalba | Digital Server
K'aak | Magic Firefly
Kukulkan | Main Firewall</textarea>
        </div>
        <button style="width:100%; padding:15px; background:var(--n-green); border:none; color:black; font-weight:bold; cursor:pointer;" onclick="renderGame()">ОБНОВИТЬ ИГРУ</button>
    </div>

    <div id="tab-core" class="tab-content config-group">
        <div class="group">
            <label>Картинка диска (URL):</label>
            <input type="text" id="d-img-url" placeholder="Вставьте прямую ссылку" oninput="liveUpdate()">
            <label>Прозрачность фона диска (0-100%):</label>
            <input type="range" id="d-alpha-val" min="0" max="100" value="90" oninput="liveUpdate()">
            <div class="row"><label>Цвет сегментов:</label><input type="color" id="d-fill-val" class="color-pick" value="#0d0d0d" onchange="liveUpdate()"></div>
            <div class="row"><label>Цвет активации:</label><input type="color" id="d-active-val" class="color-pick" value="#39FF14" onchange="liveUpdate()"></div>
        </div>
        <div class="group">
            <label>Цвет шарика:</label>
            <input type="color" id="ball-color-val" class="color-pick" value="#ffffff" onchange="liveUpdate()">
        </div>
    </div>

    <div id="tab-export" class="tab-content">
        <div class="group">
            <label>Ваша ссылка на GitHub Pages:</label>
            <input type="text" id="github-url" value="https://oksanabashlykova10-eng.github.io/match/" style="font-size: 11px;">
        </div>
        <button style="width:100%; padding:15px; background:var(--n-green); border:none; color:black; font-weight:bold; cursor:pointer;" onclick="generateExport()">СГЕНЕРИРОВАТЬ ДЛЯ GENIALLY</button>
        <textarea id="export-output" style="height: 100px; font-size: 10px; margin-top:10px;"></textarea>
    </div>
</div>

<div id="stage">
    <div id="stage-bg-layer"></div>
    <div id="header"><div id="h-rect"></div><h1 id="title-txt">Identification Protocol</h1></div>
    <div id="arena">
        <div id="disk-box">
            <svg id="disk-svg" viewBox="0 0 100 100">
                <image id="d-img-asset" x="5" y="5" width="90" height="90" href="" />
                <g id="disk-g"></g>
            </svg>
        </div>
        <div class="col" id="col-L"></div>
        <div class="col" id="col-R"></div>
    </div>
    <div id="footer"><button id="btn" onclick="check()" disabled>SYNC GLYPHS</button></div>
    <canvas id="c"></canvas>
    <div id="win-screen"><h1 id="win-text" style="font-family:'Orbitron'; color:var(--n-green); font-size:40px;">ACCESS GRANTED</h1><button onclick="resetGame()" style="padding:10px 30px; cursor:pointer;">REPLAY</button></div>
</div>

<script>
    let pairs = [], selL = null, selR = null, matched = 0, audioCtx = null;
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d'), stage = document.getElementById('stage');

    window.onload = () => {
        const hash = window.location.hash;
        if (hash.startsWith('#play=')) {
            document.body.classList.add('play-mode');
            loadGameFromHash(hash.replace('#play=', ''));
        } else { renderGame(); draw(); }
    };

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function liveUpdate() {
        const root = document.documentElement;
        document.getElementById('title-txt').innerText = document.getElementById('h-text').value;
        document.getElementById('btn').innerText = document.getElementById('btn-text').value;
        
        const dUrl = document.getElementById('d-img-url').value;
        document.getElementById('d-img-asset').setAttribute('href', dUrl);

        const dFill = document.getElementById('d-fill-val').value;
        const dAlpha = document.getElementById('d-alpha-val').value / 100;
        const r = parseInt(dFill.slice(1,3), 16), g = parseInt(dFill.slice(3,5), 16), b = parseInt(dFill.slice(5,7), 16);
        root.style.setProperty('--disk-fill', `rgba(${r},${g},${b},${dAlpha})`);
        root.style.setProperty('--disk-active', document.getElementById('d-active-val').value);
        root.style.setProperty('--ball-color', document.getElementById('ball-color-val').value);
    }

    function renderGame() {
        liveUpdate();
        const text = document.getElementById('simple-input').value;
        pairs = text.split('\n').filter(line => line.includes('|')).map(line => {
            const [l, r] = line.split('|').map(s => s.trim());
            return { l, r };
        });

        matched = 0; selL = null; selR = null;
        document.getElementById('col-L').innerHTML = '';
        document.getElementById('col-R').innerHTML = '';
        document.getElementById('btn').disabled = true;
        document.getElementById('disk-svg').style.transform = 'rotate(-90deg)';
        document.getElementById('win-screen').classList.remove('show');
        
        const g = document.getElementById('disk-g'); g.innerHTML = '';
        const step = 360 / pairs.length;
        pairs.forEach((_, i) => {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const a1 = i * step, a2 = (i + 1) * step, rad = 48;
            const x1 = 50 + rad * Math.cos(a1 * Math.PI / 180), y1 = 50 + rad * Math.sin(a1 * Math.PI / 180);
            const x2 = 50 + rad * Math.cos(a2 * Math.PI / 180), y2 = 50 + rad * Math.sin(a2 * Math.PI / 180);
            p.setAttribute("d", `M 50 50 L ${x1} ${y1} A ${rad} ${rad} 0 0 1 ${x2} ${y2} Z`);
            p.classList.add('disk-seg');
            g.appendChild(p);
        });

        const L_shuff = [...pairs].sort(() => Math.random() - 0.5);
        const R_shuff = [...pairs].sort(() => Math.random() - 0.5);
        L_shuff.forEach(item => spawnP(item.l, 'col-L', item.l));
        R_shuff.forEach(item => spawnP(item.r, 'col-R', item.l));
        resizeCanvas();
    }

    function spawnP(txt, side, id) {
        const p = document.createElement('div');
        p.className = 'plate'; p.innerText = txt; p.dataset.id = id;
        p.onclick = () => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(side === 'col-L') { if(selL) selL.classList.remove('sel'); selL = p; }
            else { if(selR) selR.classList.remove('sel'); selR = p; }
            p.classList.add('sel');
            document.getElementById('btn').disabled = !(selL && selR);
        };
        document.getElementById(side).appendChild(p);
    }

    function check() {
        if(selL.dataset.id === selR.dataset.id) {
            const L = selL, R = selR;
            const rRect = R.getBoundingClientRect(), sRect = stage.getBoundingClientRect();
            const ball = document.createElement('div'); ball.className = 'ball';
            ball.style.left = (rRect.left - sRect.left + rRect.width/2) + 'px';
            ball.style.top = (rRect.top - sRect.top + rRect.height/2) + 'px';
            stage.appendChild(ball);
            
            setTimeout(() => {
                const dBox = document.getElementById('disk-box').getBoundingClientRect();
                ball.style.left = (dBox.left - sRect.left + dBox.width/2 - 9) + 'px';
                ball.style.top = (dBox.top - sRect.top + dBox.height/2 - 9) + 'px';
                ball.style.transform = 'scale(0)';
            }, 50);

            setTimeout(() => {
                L.classList.add('matched'); R.classList.add('matched');
                document.querySelectorAll('.disk-seg')[matched].classList.add('active');
                matched++; ball.remove();
                if(matched === pairs.length) {
                    document.getElementById('disk-svg').style.transform = 'rotate(720deg)';
                    setTimeout(() => document.getElementById('win-screen').classList.add('show'), 1500);
                }
            }, 1000);
        } else {
            selL.classList.add('err'); selR.classList.add('err');
            setTimeout(() => { selL.classList.remove('sel','err'); selR.classList.remove('sel','err'); }, 800);
        }
        selL = null; selR = null; document.getElementById('btn').disabled = true;
    }

    function resetGame() { renderGame(); }
    function resizeCanvas() { canvas.width = stage.clientWidth; canvas.height = stage.clientHeight; }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        if(selL && selR) {
            const sRect = stage.getBoundingClientRect(), r1 = selL.getBoundingClientRect(), r2 = selR.getBoundingClientRect();
            ctx.beginPath(); ctx.setLineDash([5, 5]);
            ctx.moveTo(r1.right - sRect.left, r1.top - sRect.top + r1.height/2);
            ctx.lineTo(r2.left - sRect.left, r2.top - sRect.top + r2.height/2);
            ctx.strokeStyle = '#39FF14'; ctx.lineWidth = 2; ctx.stroke();
        }
        requestAnimationFrame(draw);
    }

    function generateExport() {
        const config = {};
        document.querySelectorAll('.config-group input, .config-group select, .config-group textarea').forEach(el => {
            if(el.id) config[el.id] = el.type === 'checkbox' ? el.checked : el.value;
        });
        const encoded = btoa(encodeURIComponent(JSON.stringify(config)).replace(/%([0-9A-F]{2})/g, (m, p) => String.fromCharCode('0x' + p)));
        const safeBase64 = encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        const maskedUrl = (document.getElementById('github-url').value + '#play=' + safeBase64).split('').map(c => '&#' + c.charCodeAt(0) + ';').join('');
        document.getElementById('export-output').value = `<iframe src="${maskedUrl}" style="width:100%;height:100%;border:none;" allow="autoplay"></iframe>`;
    }

    function loadGameFromHash(payload) {
        try {
            let base64 = payload.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) base64 += '=';
            const config = JSON.parse(decodeURIComponent(Array.prototype.map.call(atob(base64), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            for(let k in config) { const el = document.getElementById(k); if(el) el.value = config[k]; }
            liveUpdate(); renderGame();
        } catch(e) { console.error(e); }
    }
    window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
